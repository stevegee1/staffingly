name: Deploy to Staging

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npm run prisma:generate

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Type check backend
        working-directory: backend
        run: npm run typecheck

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy-backend-staging:
    name: Deploy Backend to Kinsta
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: staging
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Trigger Kinsta Deployment
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.kinsta.com/v2/applications/deployments" \
            -H "Authorization: Bearer ${{ secrets.KINSTA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "${{ secrets.KINSTA_BACKEND_APP_ID }}",
              "branch": "${{ github.ref_name }}"
            }')
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "Deployment trigger failed with status $http_code"
            exit 1
          fi
          echo "Backend deployment triggered on Kinsta"

  deploy-frontend-staging:
    name: Deploy Frontend to Kinsta
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: staging
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for staging
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.STAGING_API_URL }}

      - name: Trigger Kinsta Deployment
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.kinsta.com/v2/applications/deployments" \
            -H "Authorization: Bearer ${{ secrets.KINSTA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "${{ secrets.KINSTA_FRONTEND_APP_ID }}",
              "branch": "${{ github.ref_name }}"
            }')
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "Deployment trigger failed with status $http_code"
            exit 1
          fi
          echo "Frontend deployment triggered on Kinsta"
